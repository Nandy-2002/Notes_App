services:

  mysql:
    image: mysql:8.0
    container_name: notes-mysql
    environment:
      MYSQL_DATABASE: notesdb
      MYSQL_USER: notesuser
      MYSQL_PASSWORD: notespass
      MYSQL_ROOT_PASSWORD: rootpass
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpass"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - notes-network

  backend:
    build: ./Backend
    container_name: notes-backend
    ports:
      - "8081:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/notesdb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: notesuser
      SPRING_DATASOURCE_PASSWORD: notespass
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - notes-network

  frontend:
    build: ./Frontend
    container_name: notes-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - notes-network

networks:
  notes-network:
    driver: bridge

volumes:
  mysql-data: